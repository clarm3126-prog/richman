name: Momentum Screener

on:
  schedule:
    # 미너비니 다음에 실행 (KST 17:30 = UTC 8:30) 평일
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: momentum-screener
  cancel-in-progress: false

jobs:
  momentum:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run momentum screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/momentum_screener.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/momentum_results.json data/momentum_alerted.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: momentum screener results [auto]"
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, fetching and rebasing..."
            git fetch origin main
            git rebase origin/main || git rebase --abort
            sleep 2
          done
          echo "Failed to push after 3 attempts"
          exit 1
