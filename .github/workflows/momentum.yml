name: Momentum Screener

on:
  workflow_run:
    # 미너비니 끝나면 자동 실행 (DART 캐시가 fresh한 직후)
    workflows: ["Minervini Screener"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: momentum-screener
  cancel-in-progress: false

jobs:
  momentum:
    # 미너비니가 성공했을 때만 실행 (실패 시 stale data 방지)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # workflow_run 시 default branch 명시

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run momentum screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/momentum_screener.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/momentum_results.json data/momentum_alerted.json data/charts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: momentum screener results [auto]"
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, fetching and rebasing..."
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git pull --rebase=true -X theirs origin main; }
            sleep 2
          done
          echo "Failed to push after 3 attempts"
          exit 1
