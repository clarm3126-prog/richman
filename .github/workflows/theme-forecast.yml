name: Theme Forecast

on:
  schedule:
    # 매일 KST 18:45 (UTC 9:45) 평일 - 모멘텀(17:30) + 백테스트(18:00) + earnings(18:30) 끝난 후
    - cron: "45 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: theme-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run theme forecast
        run: python scripts/theme_forecast.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/theme_forecast.json data/theme_forecast_history/ data/theme_members_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: theme forecast [auto]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git fetch origin main
            git rebase origin/main || git rebase --abort
            sleep 2
          done
          exit 1
