name: Theme Forecast

on:
  workflow_run:
    workflows: ["Momentum Screener"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: theme-forecast
  cancel-in-progress: false

jobs:
  forecast:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run theme forecast
        run: python scripts/theme_forecast.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in data/theme_forecast.json data/theme_forecast_history data/theme_members_cache.json; do
            git add "$f" 2>/dev/null || true
          done
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: theme forecast [auto]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git pull --rebase=true -X theirs origin main; }
            sleep 2
          done
          exit 1
