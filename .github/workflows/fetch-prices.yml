name: Fetch Prices

on:
  schedule:
    # KST 9:00~16:00 (UTC 0:00~7:00) 평일에 5분마다
    - cron: "*/5 0-7 * * 1-5"
    # 장 마감 후 1회 (KST 16:30 = UTC 7:30)
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/history/ data/descriptions.json data/triggered_alerts.json data/watchlist.json data/alerts_config.json 2>/dev/null || git add data/market.json data/history/ data/descriptions.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update market data [auto]"
          # Retry up to 3 times with rebase if remote has new commits
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, fetching and rebasing..."
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase failed; aborting and retrying with stash"
              git rebase --abort || true
              git stash
              git pull --rebase origin main
              git stash pop || true
              git add data/market.json data/history/ data/descriptions.json data/triggered_alerts.json data/watchlist.json data/alerts_config.json 2>/dev/null || git add data/market.json data/history/ data/descriptions.json
              git diff --cached --quiet || git commit --amend --no-edit
            }
            sleep 2
          done
          echo "Failed to push after 3 attempts"
          exit 1
