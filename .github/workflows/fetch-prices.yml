name: Fetch Prices

on:
  schedule:
    # KST 9:00~16:00 (UTC 0:00~7:00) 평일에 5분마다
    - cron: "*/5 0-7 * * 1-5"
    # 장 마감 후 1회 (KST 16:30 = UTC 7:30)
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data
        run: python scripts/fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/history/ data/descriptions.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update market data [auto]"
            git push
          fi
