name: Earnings Calendar

on:
  workflow_run:
    workflows: ["Momentum Screener"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: earnings-calendar
  cancel-in-progress: false

jobs:
  earnings:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run earnings calendar
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/earnings_calendar.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/earnings_calendar.json data/earnings_alerted.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: earnings calendar [auto]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git pull --rebase=true -X theirs origin main; }
            sleep 2
          done
          exit 1
