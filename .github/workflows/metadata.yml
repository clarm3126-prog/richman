name: Stock Metadata

on:
  schedule:
    # 매주 일요일 KST 22:00 (UTC 13:00)
    - cron: "0 13 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-metadata
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch metadata
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python scripts/fetch_metadata.py

      - name: Fetch ATH cache (역사적 신고가)
        run: python scripts/fetch_ath.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stock_metadata.json data/ath_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: weekly stock metadata refresh [auto]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git pull --rebase=true -X theirs origin main; }
            sleep 2
          done
          exit 1
