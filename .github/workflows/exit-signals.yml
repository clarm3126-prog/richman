name: Exit Signals

on:
  schedule:
    # 장 마감 후 매일 KST 16:45 (UTC 7:45) 평일
    # fetch-prices 16:30 → exit-signals 16:45 → minervini 17:00 → momentum 17:30
    - cron: "45 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: exit-signals
  cancel-in-progress: false

jobs:
  exit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run exit signals
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/exit_signals.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in data/exit_signals.json data/exit_alerted.json data/alert_log.json; do
            git add "$f" 2>/dev/null || true
          done
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: exit signals update [auto]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git pull --rebase=true -X theirs origin main; }
            sleep 2
          done
          exit 1
