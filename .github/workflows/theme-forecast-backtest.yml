name: Theme Forecast Backtest

on:
  schedule:
    # 매주 토요일 KST 10:00 (UTC 1:00)
    - cron: "0 1 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: theme-forecast-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run theme forecast backtest
        run: python scripts/theme_forecast_backtest.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in data/theme_forecast_stats.json data/theme_forecast_weights.json; do
            git add "$f" 2>/dev/null || true
          done
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: weekly theme forecast backtest [auto]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git pull --rebase=true -X theirs origin main; }
            sleep 2
          done
          exit 1
