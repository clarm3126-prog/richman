name: Minervini Screener

on:
  schedule:
    # 장 마감 후 KST 17:00 (UTC 8:00) 평일
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: minervini-screener
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 첫 실행 DART 대량 fetch 대비 (이후엔 캐시 활용 5~10분)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Minervini screener
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/screener.py

      - name: Commit and push
        # 핵심: 스크리너 실행 실패/timeout 되어도 partial cache 보존
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/screener_results.json data/dart_corp_codes.json data/dart_financials.json data/screener_alerted.json data/charts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: minervini screener results [auto]"
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, fetching and rebasing..."
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git pull --rebase=true -X theirs origin main; }
            sleep 2
          done
          echo "Failed to push after 3 attempts"
          exit 1
