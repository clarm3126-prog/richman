name: Backtest

on:
  workflow_run:
    # 모멘텀 끝나면 자동 실행 (screener+momentum 결과 fresh한 직후)
    workflows: ["Momentum Screener"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backtest
  cancel-in-progress: false

jobs:
  backtest:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        run: python scripts/backtest.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in data/backtest_stats.json data/screener_results_history data/momentum_results_history data/ath_breakouts_history; do
            git add "$f" 2>/dev/null || true
          done
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: backtest stats + history archive [auto]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git pull --rebase=true -X theirs origin main; }
            sleep 2
          done
          exit 1
