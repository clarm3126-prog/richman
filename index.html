const state = { activeTheme: "전체", query: "", historyDate: null, historyThemes: null };
let MARKET = null;

function fmtDateStr(yyyymmdd) {
  if (!yyyymmdd || yyyymmdd.length !== 8) return '';
  return `${yyyymmdd.slice(0,4)}-${yyyymmdd.slice(4,6)}-${yyyymmdd.slice(6,8)}`;
}

async function onHistoryDateChange(input) {
  const v = input.value;
  if (!v) { resetHistory(); return; }
  const dateStr = v.replace(/-/g, '');
  try {
    const res = await fetch(`data/history/${dateStr}.json?t=${Date.now()}`);
    if (!res.ok) {
      alert(`${v} 데이터가 없습니다.\n\n데이터는 영업일에만 수집됩니다.`);
      input.value = state.historyDate ? fmtDateStr(state.historyDate) : '';
      return;
    }
    const data = await res.json();
    state.historyDate = dateStr;
    state.historyThemes = data.themes || [];
    if (MARKET) renderMarket(MARKET);
  } catch (e) {
    alert('데이터 로드 실패');
  }
}

function resetHistory() {
  state.historyDate = null;
  state.historyThemes = null;
  if (MARKET) renderMarket(MARKET);
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const header = document.querySelector('header');
  const offset = header ? header.offsetHeight + 8 : 100;
  const top = el.getBoundingClientRect().top + window.pageYOffset - offset;
  window.scrollTo({ top, behavior: 'smooth' });
}

function fmtVolume(v) {
  if (!v) return '0';
  if (v >= 100000000) return (v / 100000000).toFixed(2) + '억';
  if (v >= 10000) return Math.floor(v / 10000).toLocaleString('ko-KR') + '만';
  return v.toLocaleString('ko-KR');
}

function render() {
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');

  if (!tabsEl.children.length) {
    const themes = ["전체", ...DATA.themes.map(t => t.name)];
    themes.forEach(name => {
      const tab = document.createElement('button');
      tab.className = 'tab' + (name === state.activeTheme ? ' active' : '');
      tab.textContent = name;
      tab.onclick = () => {
        state.activeTheme = name;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === name));
        renderContent();
      };
      tabsEl.appendChild(tab);
    });
  }

  renderContent();
}

function renderContent() {
  const contentEl = document.getElementById('content');
  const q = state.query.trim().toLowerCase();
  const themes = state.activeTheme === "전체"
    ? DATA.themes
    : DATA.themes.filter(t => t.name === state.activeTheme);

  let html = '';
  let totalShown = 0;

  themes.forEach(theme => {
    const filtered = theme.companies.filter(c => {
      if (!q) return true;
      return c.name.toLowerCase().includes(q)
        || c.code.includes(q)
        || c.description.toLowerCase().includes(q)
        || theme.name.toLowerCase().includes(q);
    });
    if (!filtered.length) return;
    totalShown += filtered.length;

    html += `<section class="theme-section">
      <div class="theme-header">
        <span class="theme-name">${theme.name}</span>
        <span class="count-badge">${filtered.length}종목</span>
      </div>
      <div class="theme-desc">${theme.description}</div>`;

    filtered.forEach(c => {
      const roleClass = c.role === '핵심주' ? 'role-core' : 'role-related';
      const sd = (typeof MARKET !== 'undefined' && MARKET) ? MARKET.stocks[c.code] : null;
      let chgHtml = '';
      let priceRow = '';
      if (sd) {
        const cls = sd.change > 0 ? 'up' : sd.change < 0 ? 'down' : 'flat';
        const sign = sd.change > 0 ? '+' : '';
        chgHtml = `<span class="card-change ${cls}">${sign}${sd.change.toFixed(2)}%</span>`;
        const changeWon = sd.change !== 0
          ? Math.round(sd.price * sd.change / (100 + sd.change))
          : 0;
        const arrow = sd.change > 0 ? '▲' : sd.change < 0 ? '▼' : '─';
        const wonStr = changeWon === 0 ? '0' : Math.abs(changeWon).toLocaleString('ko-KR');
        priceRow = `<div class="price-row">
          <span class="price">${sd.price.toLocaleString('ko-KR')}원</span>
          <span class="change-won ${cls}">${arrow} ${wonStr}</span>
          <span class="volume-info">거래량 ${fmtVolume(sd.volume)}</span>
        </div>`;
      }
      html += `<div class="card">
        <div class="card-top">
          <div class="name-block">
            <span class="company-name">${c.name}</span>
            <span class="company-code">${c.code}</span>
            ${chgHtml}
          </div>
          <span class="role ${roleClass}">${c.role}</span>
        </div>
        ${priceRow}
        <div class="description">${c.description}</div>
        <div class="links">
          <a class="link-btn" target="_blank" rel="noopener" href="https://finance.naver.com/item/main.naver?code=${c.code}">네이버 증권</a>
          <a class="link-btn" target="_blank" rel="noopener" href="https://m.stock.naver.com/domestic/stock/${c.code}/total">모바일 시세</a>
        </div>
      </div>`;
    });
    html += `</section>`;
  });

  if (!totalShown) {
    html = `<div class="empty">검색 결과가 없습니다.</div>`;
  }

  contentEl.innerHTML = html;
}

document.getElementById('search').addEventListener('input', e => {
  state.query = e.target.value;
  renderContent();
});

render();

async function loadMarket() {
  const res = await fetch('data/market.json?t=' + Date.now());
  if (!res.ok) throw new Error('market.json not found');
  const data = await res.json();
  if (!data.stocks || Object.keys(data.stocks).length === 0) {
    throw new Error('empty');
  }
  return data;
}

function calcStrength(market) {
  return DATA.themes.map(theme => {
    let weighted = 0, totalWeight = 0, valid = 0;
    for (const c of theme.companies) {
      const s = market.stocks[c.code];
      if (!s) continue;
      const weight = c.role === '핵심주' ? 2 : 1;
      weighted += s.change * weight;
      totalWeight += weight;
      valid++;
    }
    return {
      name: theme.name,
      avg: totalWeight > 0 ? weighted / totalWeight : null,
      valid,
      total: theme.companies.length,
    };
  }).filter(t => t.avg !== null).sort((a, b) => b.avg - a.avg);
}

function getTopMovers(market, n) {
  const arr = Object.entries(market.stocks)
    .map(([code, s]) => ({ code, ...s }))
    .filter(s => s.volume > 10000 && s.price > 0);
  return {
    gainers: [...arr].sort((a, b) => b.change - a.change).slice(0, n),
    losers: [...arr].sort((a, b) => a.change - b.change).slice(0, n),
  };
}

const colorClass = v => v > 0 ? 'up' : v < 0 ? 'down' : 'flat';
const fmtPct = v => (v > 0 ? '+' : '') + v.toFixed(2) + '%';
const fmtNum = v => v.toLocaleString('ko-KR');

    </tr>`;
  });
  html += '</tbody></table>';
  html += `</div>`;

  // --- 전체 시장 하락 TOP 10 ---
  html += `<div class="strength-section">`;
  html += `<div class="strength-title" style="margin-bottom:8px">📉 전체 시장 하락 TOP 10</div>`;
  html += '<table class="strength-table"><tbody>';
  movers.losers.forEach((s, i) => {
    html += `<tr class="strength-row" data-code="${s.code}">
      <td>${i + 1}</td>
      <td>${s.name}<div class="company-code" style="display:block;font-size:10px;margin-top:2px">${s.code} · ${s.market}</div></td>
      <td class="num down">${fmtPct(s.change)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  html += `</div>`;

  // --- 52주 신고가 ---
  html += `<div class="strength-section" id="section-newhighs">`;
  html += `<div class="strength-title" style="margin-bottom:8px">🚀 52주 신고가</div>`;
  html += `<div class="strength-meta" style="margin-bottom:6px">52주 최고가 갱신 종목 · 행 클릭 시 네이버 시세</div>`;
  const newHighs = market.new_highs || [];
  if (newHighs.length === 0) {
    html += `<div class="strength-loading">52주 신고가 데이터를 준비 중입니다.<br><span style="font-size:11px">GitHub Actions 다음 실행 후 표시됩니다.</span></div>`;
  } else {
    html += '<table class="strength-table"><tbody>';
    let shown = 0;
    for (const code of newHighs) {
      if (shown >= 30) break;
      const s = market.stocks[code];
      if (!s) continue;
      const cls = s.change > 0 ? 'up' : s.change < 0 ? 'down' : 'flat';
      shown++;
      html += `<tr class="strength-row" data-code="${code}">
        <td>${shown}</td>
        <td>${s.name}<div class="company-code" style="display:block;font-size:10px;margin-top:2px">${code} · ${s.market}</div></td>
        <td class="num ${cls}">${fmtPct(s.change)}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    if (newHighs.length > 30) {
      html += `<div class="strength-meta" style="margin-top:6px;text-align:center">총 ${newHighs.length}종목 중 상위 30개 표시</div>`;
    }
  }
  html += `</div>`;

  el.innerHTML = html;

  // 테마 행 → 해당 테마 필터링 (내부 테마)
  el.querySelectorAll('.strength-row[data-theme]').forEach(row => {
    row.onclick = () => {
      const themeName = row.dataset.theme;
      state.activeTheme = themeName;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === themeName));
      renderContent();
      const c = document.getElementById('content');
      if (c) c.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
  });
  // 네이버 테마 행 → 네이버 테마 페이지 새 탭
  el.querySelectorAll('.strength-row[data-theme-no]').forEach(row => {
    row.onclick = () => {
      window.open(`https://finance.naver.com/sise/sise_group_detail.naver?type=theme&no=${row.dataset.themeNo}`, '_blank');
    };
  });
  // 종목 행 → 네이버 시세 새 탭
  el.querySelectorAll('.strength-row[data-code]').forEach(row => {
    row.onclick = () => {
      window.open(`https://m.stock.naver.com/domestic/stock/${row.dataset.code}/total`, '_blank');
    };
  });
}

async function initMarket() {
  const el = document.getElementById('strength');
  el.innerHTML = `<div class="strength-section"><div class="strength-loading">⏳ 시장 데이터 불러오는 중...</div></div>`;
  try {
    MARKET = await loadMarket();
    renderMarket(MARKET);
    renderContent();
  } catch (e) {
    el.innerHTML = `<div class="strength-section"><div class="strength-loading">
      ⚠️ 시장 데이터를 아직 불러올 수 없습니다.<br>
      <span style="font-size:11px;line-height:1.6">GitHub Actions 첫 실행 후 데이터가 준비됩니다.<br>레포 → Actions 탭 → "Fetch Prices" → "Run workflow"로 수동 실행 가능.</span><br>
      <button class="refresh-btn" onclick="initMarket()" style="margin-top:10px">↻ 다시 시도</button>
    </div></div>`;
    console.error(e);
  }
}

initMarket();
</script>
</body>
</html>
